<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Coustard:wght@400;900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:wdth,wght@75..100,100..900&display=swap"
      rel="stylesheet"
    />
  
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=location_on"
    />

    <link rel="stylesheet" href="src/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>weather App</title>
</head>
<body>
    <div class="weather-app">
      <header>
        <h1 id="greeting"></h1>
        <form id="search-form">
          <div class="search-bar">
            <input
              type="text"
              id="city-input"
              placeholder="Search a city..."
              autocomplete="off"
            />
            <button type="submit" id="search-btn">search</button>
            <button type="button" id="location-btn">
              <span class="material-symbols-outlined">location_on</span>
            </button>
          </div>
        </form>
      </header>

      <main id="results">
        <h2 id="city">Durban</h2>
        <p id="date-time"></p>

        <div class="weather-display">
          <img id="icon" alt="" />
          <div class="temperature">
            <span id="temperature"></span><span class="degree">°C</span>
          </div>
        </div>

        <p id="description"></p>
        <p id="weather-mood"></p>

        <div class="weather-details">
          <span>💧 Humidity: <strong id="humidity"></strong></span>
          <span>🌬️ Wind: <strong id="wind"></strong></span>
        </div>
      </main>
      <br />
      <hr />

      <footer>
        <p>
          This project was coded by
          <a
            href="https://www.linkedin.com/in/thandiwe-kheswa-1089a8357"
            target="_blank"
            >Thandiwe Kheswa</a
          >
          and is <a href="https://github.com/kheswathandi/Sky-Cast" target="_blank"> on GitHub</a> and
          <a href="   " target="_blank">hosted on Netlify</a>
        </p>
      </footer>
    </div> 
    <script src="src/index.js"></script>
</body>
</html>
